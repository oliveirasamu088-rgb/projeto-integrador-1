  <section class="admin-blog">

    <h2>Nova Publicação</h2>

    <input
        type="text"
        id="titulo"

    <textarea
        id="texto"
        placeholder="Conteúdo da notícia">
    </textarea>

    <input
        type="file"
        id="imagem"
        accept="image/*">

    <button id="addPost" class="btn-primary">
        Publicar

</section>

<section class="featured">

    <div class="featured-card">
        <h2>Destaque da Semana</h2>

            Tecnologias modernas continuam revolucionando a forma
            como aplicações são desenvolvidas.
